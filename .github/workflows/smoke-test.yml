name: Smoke Test

on:
  pull_request:
    paths:
      - 'requirements.txt'
      - 'update_gateway.py'
      - 'cleanup_gateway.py'
      - '.github/workflows/smoke-test.yml'
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14.5'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import modules
        env:
          CLOUDFLARE_API_TOKEN: 'dummy-token-for-import-check'
          CLOUDFLARE_ACCOUNT_ID: 'dummy-account-for-import-check'
        run: |
          python -c "import update_gateway; import cleanup_gateway; print('Imports OK')"
